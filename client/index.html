<!DOCTYPE html>
<html lang="pt-BR" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Language" content="pt-BR" />
    <meta name="language" content="Portuguese" />
    <meta name="google" content="notranslate" />
    <meta name="translate" content="no" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="description" content="Plataforma Vestibulando - Sistema educacional completo para gestão de tarefas, notas e acompanhamento de estudantes preparando para o vestibular">
    <meta property="og:title" content="Vestibulando | Plataforma Educacional">
    <meta property="og:description" content="Gerencie tarefas, envie trabalhos e acompanhe o progresso dos alunos">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="pt_BR">
    <title>Vestibulando | Plataforma Educacional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        if (window.location.hostname === 'localhost' || window.location.hostname.includes('.replit.dev') || window.location.hostname.includes('.repl.co')) {
          var isFirestoreError = function(msg) {
            if (!msg) return false;
            return msg.indexOf('INTERNAL ASSERTION FAILED') !== -1 || 
                   msg.indexOf('firebase_firestore') !== -1 ||
                   msg.indexOf('__PRIVATE_') !== -1 ||
                   msg.indexOf('WatchChangeAggregator') !== -1 ||
                   msg.indexOf('PersistentListenStream') !== -1 ||
                   msg.indexOf('Unexpected state') !== -1;
          };
          window.addEventListener('error', function(e) {
            if (isFirestoreError(e.message) || (e.error && isFirestoreError(e.error.message)) || (e.error && isFirestoreError(e.error.stack))) {
              e.preventDefault();
              e.stopImmediatePropagation();
              console.warn('[Firebase] Erro interno suprimido');
              return false;
            }
          }, true);
          window.addEventListener('unhandledrejection', function(e) {
            var reason = e.reason;
            if (reason && (isFirestoreError(reason.message) || isFirestoreError(reason.stack))) {
              e.preventDefault();
              e.stopImmediatePropagation();
              console.warn('[Firebase] Promise rejection suprimida');
            }
          }, true);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
